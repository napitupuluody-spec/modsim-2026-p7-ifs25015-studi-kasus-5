<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Generator Soal Latihan — Studi Kasus 5</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
    }

    header {
      background: linear-gradient(135deg, #1e3a8a 0%, #7c3aed 100%);
      padding: 1.5rem 2rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      box-shadow: 0 4px 20px rgba(0,0,0,0.4);
    }
    header .logo { font-size: 2rem; }
    header h1 { font-size: 1.4rem; font-weight: 700; }
    header p { font-size: 0.85rem; opacity: 0.8; }

    .container { max-width: 960px; margin: 0 auto; padding: 2rem 1rem; }

    .tabs { display: flex; gap: 0.5rem; margin-bottom: 1.5rem; }
    .tab-btn {
      padding: 0.6rem 1.4rem;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.9rem;
      font-weight: 600;
      background: #1e293b;
      color: #94a3b8;
      transition: all 0.2s;
    }
    .tab-btn.active { background: #6d28d9; color: #fff; }
    .tab-btn:hover:not(.active) { background: #334155; color: #e2e8f0; }

    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* FORM */
    .card {
      background: #1e293b;
      border-radius: 16px;
      padding: 2rem;
      margin-bottom: 1.5rem;
      border: 1px solid #334155;
    }
    .card h2 { font-size: 1.1rem; margin-bottom: 1.2rem; color: #a78bfa; }

    .form-group { margin-bottom: 1.2rem; }
    label { display: block; font-size: 0.85rem; font-weight: 600; color: #94a3b8; margin-bottom: 0.4rem; }
    input[type=text], select, input[type=number] {
      width: 100%;
      padding: 0.7rem 1rem;
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 8px;
      color: #e2e8f0;
      font-size: 0.95rem;
      transition: border-color 0.2s;
    }
    input[type=text]:focus, select:focus, input[type=number]:focus {
      outline: none;
      border-color: #7c3aed;
    }
    select option { background: #1e293b; }

    .form-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1rem; }

    .btn {
      padding: 0.8rem 2rem;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-size: 1rem;
      font-weight: 700;
      transition: all 0.2s;
    }
    .btn-primary { background: linear-gradient(135deg, #6d28d9, #3b82f6); color: #fff; width: 100%; }
    .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    /* LOADING */
    .loading {
      display: none;
      text-align: center;
      padding: 2rem;
    }
    .loading.visible { display: block; }
    .spinner {
      width: 48px; height: 48px;
      border: 4px solid #334155;
      border-top-color: #7c3aed;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 1rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* RESULTS */
    #results { margin-top: 1.5rem; }

    .result-header {
      background: linear-gradient(135deg, #064e3b, #065f46);
      border-radius: 12px;
      padding: 1rem 1.5rem;
      margin-bottom: 1rem;
      border: 1px solid #10b981;
    }
    .result-header h3 { color: #34d399; font-size: 1rem; }
    .result-header p { color: #a7f3d0; font-size: 0.85rem; margin-top: 0.2rem; }

    .question-card {
      background: #1e293b;
      border-radius: 12px;
      padding: 1.2rem 1.5rem;
      margin-bottom: 1rem;
      border-left: 4px solid #6d28d9;
      animation: fadeIn 0.3s ease;
    }
    @keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:none; } }

    .q-number {
      font-size: 0.75rem;
      font-weight: 700;
      color: #a78bfa;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 0.5rem;
    }
    .q-text { font-size: 1rem; font-weight: 600; margin-bottom: 0.8rem; line-height: 1.5; }

    .options { list-style: none; display: flex; flex-direction: column; gap: 0.4rem; }
    .options li {
      padding: 0.5rem 0.8rem;
      background: #0f172a;
      border-radius: 6px;
      font-size: 0.9rem;
      border: 1px solid #334155;
    }
    .options li.correct { border-color: #10b981; background: #022c22; color: #34d399; }

    .q-answer {
      margin-top: 0.8rem;
      padding: 0.6rem 0.8rem;
      background: #052e16;
      border-radius: 6px;
      font-size: 0.85rem;
      color: #6ee7b7;
    }
    .q-explanation {
      margin-top: 0.5rem;
      font-size: 0.82rem;
      color: #94a3b8;
      font-style: italic;
    }

    /* ERROR */
    .error-box {
      background: #450a0a;
      border: 1px solid #ef4444;
      border-radius: 10px;
      padding: 1rem 1.5rem;
      color: #fca5a5;
      margin-top: 1rem;
    }

    /* HISTORY */
    .history-item {
      background: #1e293b;
      border-radius: 10px;
      padding: 1rem 1.2rem;
      margin-bottom: 0.8rem;
      border: 1px solid #334155;
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
      transition: border-color 0.2s;
    }
    .history-item:hover { border-color: #7c3aed; }
    .history-meta { font-size: 0.8rem; color: #64748b; margin-top: 0.25rem; }
    .badge {
      font-size: 0.72rem;
      padding: 0.2rem 0.6rem;
      border-radius: 20px;
      font-weight: 600;
      background: #312e81;
      color: #a5b4fc;
    }
    .badge.easy { background: #064e3b; color: #34d399; }
    .badge.medium { background: #713f12; color: #fbbf24; }
    .badge.hard { background: #450a0a; color: #f87171; }

    .empty-state {
      text-align: center;
      padding: 3rem;
      color: #475569;
    }
    .empty-state .icon { font-size: 3rem; margin-bottom: 0.5rem; }

    .refresh-btn {
      padding: 0.5rem 1.2rem;
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 8px;
      color: #94a3b8;
      cursor: pointer;
      font-size: 0.85rem;
      margin-bottom: 1rem;
      transition: all 0.2s;
    }
    .refresh-btn:hover { border-color: #7c3aed; color: #a78bfa; }
  </style>
</head>
<body>

<header>
  <div class="logo">📝</div>
  <div>
    <h1>Generator Soal Latihan</h1>
    <p>Studi Kasus 5 — Modsim 2026 · Powered by Claude AI</p>
  </div>
</header>

<div class="container">
  <div class="tabs">
    <button class="tab-btn active" onclick="showTab('generate')">✨ Generate Soal</button>
    <button class="tab-btn" onclick="showTab('history')">🕘 Riwayat</button>
  </div>

  <!-- TAB: GENERATE -->
  <div id="tab-generate" class="tab-panel active">
    <div class="card">
      <h2>⚙️ Konfigurasi Soal</h2>

      <div class="form-group">
        <label>Topik / Materi</label>
        <input type="text" id="topic" placeholder="Contoh: Algoritma Sorting dalam Python" />
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Tingkat Kesulitan</label>
          <select id="difficulty">
            <option value="easy">😊 Mudah</option>
            <option value="medium" selected>🧐 Sedang</option>
            <option value="hard">🔥 Sulit</option>
          </select>
        </div>
        <div class="form-group">
          <label>Tipe Soal</label>
          <select id="question_type">
            <option value="multiple_choice" selected>Pilihan Ganda</option>
            <option value="true_false">Benar / Salah</option>
            <option value="essay">Esai</option>
          </select>
        </div>
        <div class="form-group">
          <label>Jumlah Soal</label>
          <input type="number" id="num_questions" value="5" min="1" max="20" />
        </div>
      </div>

      <button class="btn btn-primary" id="generateBtn" onclick="generateQuestions()">
        🚀 Generate Soal
      </button>
    </div>

    <div class="loading" id="loading">
      <div class="spinner"></div>
      <p style="color:#94a3b8;">Sedang meminta Claude AI untuk membuat soal…</p>
    </div>

    <div id="results"></div>
  </div>

  <!-- TAB: HISTORY -->
  <div id="tab-history" class="tab-panel">
    <button class="refresh-btn" onclick="loadHistory()">🔄 Refresh Riwayat</button>
    <div id="historyList"></div>
  </div>
</div>

<script>
  // ── Tab navigation ──────────────────────────────────────────────────────────
  function showTab(name) {
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('tab-' + name).classList.add('active');
    event.currentTarget.classList.add('active');
    if (name === 'history') loadHistory();
  }

  // ── Generate ────────────────────────────────────────────────────────────────
  async function generateQuestions() {
    const topic = document.getElementById('topic').value.trim();
    if (!topic) { alert('Masukkan topik soal terlebih dahulu!'); return; }

    const payload = {
      topic,
      difficulty: document.getElementById('difficulty').value,
      question_type: document.getElementById('question_type').value,
      num_questions: parseInt(document.getElementById('num_questions').value),
    };

    document.getElementById('generateBtn').disabled = true;
    document.getElementById('loading').classList.add('visible');
    document.getElementById('results').innerHTML = '';

    try {
      const res = await fetch('/api/generate', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload),
      });
      const data = await res.json();

      if (!data.success) throw new Error(data.error || 'Terjadi kesalahan.');
      renderResults(data);
    } catch (err) {
      document.getElementById('results').innerHTML =
        `<div class="error-box">❌ <strong>Error:</strong> ${err.message}</div>`;
    } finally {
      document.getElementById('generateBtn').disabled = false;
      document.getElementById('loading').classList.remove('visible');
    }
  }

  function renderResults(data) {
    const typeLabel = { multiple_choice: 'Pilihan Ganda', true_false: 'Benar/Salah', essay: 'Esai' };
    const diffLabel = { easy: '😊 Mudah', medium: '🧐 Sedang', hard: '🔥 Sulit' };

    let html = `
      <div class="result-header">
        <h3>✅ Berhasil membuat ${data.questions.length} soal</h3>
        <p>Topik: <strong>${data.topic}</strong> &nbsp;·&nbsp;
           Tipe: ${typeLabel[data.question_type] || data.question_type} &nbsp;·&nbsp;
           Kesulitan: ${diffLabel[data.difficulty] || data.difficulty} &nbsp;·&nbsp;
           ID: #${data.record_id}</p>
      </div>
    `;

    data.questions.forEach((q, i) => {
      html += `<div class="question-card">
        <div class="q-number">Soal ${i + 1}</div>
        <div class="q-text">${escHtml(q.question)}</div>`;

      if (q.options && q.options.length) {
        html += '<ul class="options">';
        q.options.forEach(opt => {
          const isCorrect = opt.startsWith(q.answer + '.') || opt === q.answer ||
                            opt.startsWith(q.answer + ' ') || opt === q.answer + '.';
          html += `<li class="${isCorrect ? 'correct' : ''}">${escHtml(opt)}</li>`;
        });
        html += '</ul>';
      }

      if (q.answer) {
        html += `<div class="q-answer">💡 Jawaban: <strong>${escHtml(q.answer)}</strong></div>`;
      }
      if (q.explanation) {
        html += `<div class="q-explanation">📖 ${escHtml(q.explanation)}</div>`;
      }
      html += '</div>';
    });

    document.getElementById('results').innerHTML = html;
  }

  // ── History ─────────────────────────────────────────────────────────────────
  async function loadHistory() {
    document.getElementById('historyList').innerHTML =
      '<p style="color:#64748b;padding:1rem;">Memuat riwayat…</p>';
    try {
      const res = await fetch('/api/history?limit=30');
      const data = await res.json();
      renderHistory(data.data || []);
    } catch {
      document.getElementById('historyList').innerHTML =
        '<div class="error-box">Gagal memuat riwayat.</div>';
    }
  }

  function renderHistory(records) {
    if (!records.length) {
      document.getElementById('historyList').innerHTML =
        '<div class="empty-state"><div class="icon">📭</div><p>Belum ada soal yang di-generate.</p></div>';
      return;
    }
    const diffLabel = { easy: 'Mudah', medium: 'Sedang', hard: 'Sulit' };
    const typeLabel = { multiple_choice: 'Pilihan Ganda', true_false: 'Benar/Salah', essay: 'Esai' };
    let html = '';
    records.forEach(r => {
      const date = new Date(r.created_at).toLocaleString('id-ID');
      html += `
        <div class="history-item" onclick="showHistoryDetail(${r.id})">
          <div>
            <strong>${escHtml(r.topic)}</strong>
            <div class="history-meta">${date} &nbsp;·&nbsp; ${r.num_questions} soal &nbsp;·&nbsp; ${typeLabel[r.question_type] || r.question_type}</div>
          </div>
          <span class="badge ${r.difficulty}">${diffLabel[r.difficulty] || r.difficulty}</span>
        </div>`;
    });
    document.getElementById('historyList').innerHTML = html;
  }

  async function showHistoryDetail(id) {
    try {
      const res = await fetch(`/api/history/${id}`);
      const data = await res.json();
      if (!data.success) throw new Error(data.error);
      // Switch to generate tab and show results
      document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.getElementById('tab-generate').classList.add('active');
      document.querySelectorAll('.tab-btn')[0].classList.add('active');
      renderResults({ ...data.data, questions: data.data.questions });
    } catch (err) {
      alert('Gagal memuat detail: ' + err.message);
    }
  }

  function escHtml(str) {
    return String(str)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;')
      .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
</script>
</body>
</html>
